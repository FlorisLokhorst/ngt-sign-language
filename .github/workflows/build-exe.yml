name: Build Windows .exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install fastapi "uvicorn[standard]" mediapipe opencv-python pillow python-multipart numpy pywebview pyinstaller h11 httptools websockets anyio python-multipart

      - name: Build frontend
        working-directory: sign-see-ngt-main
        run: |
          npm install
          npm run build

      - name: Verify model files exist
        run: |
          if (!(Test-Path "models/best_ngt_model_v2.pth")) {
            Write-Error "Missing models/best_ngt_model_v2.pth — add it to the repo or use Git LFS"
            exit 1
          }
          if (!(Test-Path "models/best_landmark_mlp.pth")) {
            Write-Error "Missing models/best_landmark_mlp.pth"
            exit 1
          }

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller SignSeeNGT_Desktop.spec --noconfirm

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist/SignSeeNGT -DestinationPath SignSeeNGT-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SignSeeNGT-Windows
          path: SignSeeNGT-Windows.zip
          retention-days: 30

      - name: Upload to release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SignSeeNGT-Windows.zip
